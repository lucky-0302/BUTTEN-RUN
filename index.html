<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTTEN-RUN:정우바보 럭키천재</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        
        /* 메인 버튼 */
        @keyframes rainbow {
            0% { background: #ff0000; box-shadow: 0 0 20px #ff0000; }
            33% { background: #00ff00; box-shadow: 0 0 20px #00ff00; }
            66% { background: #0000ff; box-shadow: 0 0 20px #0000ff; }
            100% { background: #ff0000; box-shadow: 0 0 20px #ff0000; }
        }

        .btn {
            position: absolute; padding: 20px 40px; font-size: 24px; font-weight: 900;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            z-index: 100; left: 50%; top: 50%; transform: translate(-50%, -50%);
            animation: rainbow 0.8s infinite linear;
            transition: left 0.1s ease, top 0.1s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }

        /* 섬광 레이어 */
        #flash-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        #flash-text { color: black; font-size: 5rem; font-weight: 900; display: none; }

        .effect { position: absolute; pointer-events: none; z-index: 50; font-size: 40px; }
        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) translate(var(--x), var(--y)) scale(1.5); opacity: 0; }
        }

        h1 { position: absolute; width: 100%; text-align: center; color: #fff; top: 10%; pointer-events: none; }
    </style>
</head>
<body>

    <h1>🔥버튼을 누르면 럭키마켓 평생 God 지급!🔥</h1>
    <button id="main-btn" class="btn">지금 클릭!</button>
    
    <div id="flash-layer"><span id="flash-text">✨섬광탄✨</span></div>

    <script>
        const btn = document.getElementById('main-btn');
        const flashLayer = document.getElementById('flash-layer');
        const flashText = document.getElementById('flash-text');
        const emojis = ['😂', '👅', '💨', '🚫', '👻', '🤡', '💩', '✨', '🔥', '🥶', '🎶'];

        function troll() {
            // 1. [추가] 15% 확률로 분신술 발동
            if (Math.random() < 0.25) {
                for(let i=0; i<12; i++) {
                    const clone = btn.cloneNode(true);
                    clone.id = ""; // ID 중복 방지
                    clone.style.left = Math.random() * 90 + 5 + '%';
                    clone.style.top = Math.random() * 90 + 5 + '%';
                    clone.style.opacity = "0.6";
                    clone.innerText = "지금 클릭?";
                    clone.style.pointerEvents = "auto";
                    
                    // 가짜 누르면 알림창 띄우기
                    clone.onclick = () => alert("속았네, 다시 시도해봐 :D");
                    
                    document.body.appendChild(clone);
                    // 1.5초 뒤에 사라짐
                    setTimeout(() => clone.remove(), 1500);
                }
            }

            // 2. 20% 확률로 섬광탄 발동 (기존 유지)
            if (Math.random() < 0.2) {
                flashLayer.style.opacity = '1';
                flashText.style.display = 'block';
                
                btn.style.left = Math.random() * 80 + 10 + '%';
                btn.style.top = Math.random() * 80 + 10 + '%';

                setTimeout(() => {
                    flashLayer.style.transition = 'opacity 2s ease-out';
                    flashLayer.style.opacity = '0';
                    setTimeout(() => {
                        flashLayer.style.transition = 'none';
                        flashText.style.display = 'none';
                    }, 2000);
                }, 500);
                return;
            }

            // 3. 일반 도망가기 및 크기 조절 (기존 유지)
            const newX = Math.random() * 80 + 10;
            const newY = Math.random() * 80 + 10;
            btn.style.left = newX + '%';
            btn.style.top = newY + '%';

            const randomScale = Math.random() * 1.7 + 0.3;
            btn.style.transform = `translate(-50%, -50%) scale(${randomScale})`;

            // 4. 이모지 효과 (기존 유지)
            for(let i=0; i<8; i++) {
                const el = document.createElement('div');
                el.className = 'effect';
                el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = btn.style.left;
                el.style.top = btn.style.top;
                const moveX = (Math.random() - 0.5) * 400 + 'px';
                const moveY = (Math.random() - 0.5) * 400 + 'px';
                el.style.setProperty('--x', moveX);
                el.style.setProperty('--y', moveY);
                el.style.animation = 'popOut 0.8s forwards';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 800);
            }
        }

        btn.addEventListener('mouseover', troll);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); troll(); });
        btn.onclick = () => alert("사실 구라에요, 다음 기회에..☆*: .｡. o(≧▽≦)o .｡.:*☆");
    </script>
</body>
</html>
