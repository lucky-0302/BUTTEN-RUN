<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BUTTEN-RUN:м§ұм§ұл©Ӣм§„ лҹӯнӮӨ</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: none; }
        
        .btn {
            position: absolute; padding: 20px 40px; font-size: 24px; font-weight: 900;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            z-index: 100; left: 50%; top: 50%; transform: translate(-50%, -50%);
            animation: rainbow 0.8s infinite linear;
            transition: left 0.15s ease-out, top 0.15s ease-out, transform 0.2s ease;
            white-space: nowrap;
        }

        @keyframes rainbow {
            0% { background: #ff0000; box-shadow: 0 0 20px #ff0000; }
            33% { background: #00ff00; box-shadow: 0 0 20px #00ff00; }
            66% { background: #0000ff; box-shadow: 0 0 20px #0000ff; }
            100% { background: #ff0000; box-shadow: 0 0 20px #ff0000; }
        }

        #flash-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        #flash-text { color: black; font-size: 3rem; font-weight: 900; display: none; }

        .effect { position: absolute; pointer-events: none; z-index: 50; font-size: 40px; }
        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) translate(var(--x), var(--y)) scale(1.5); opacity: 0; }
        }

        h1 { position: absolute; width: 100%; text-align: center; color: #fff; top: 10%; pointer-events: none; z-index: 10; padding: 0 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1>рҹ’ҺлІ„нҠјмқ„ лҲ„лҘҙл©ҙ лҹӯнӮӨл§Ҳмј“ нҸүмғқ God м§Җкёү!рҹ’Һ</h1>
    <button id="main-btn" class="btn">м§ҖкёҲ нҒҙлҰӯ!</button>
    
    <div id="flash-layer"><span id="flash-text">вңЁм„¬кҙ‘нғ„вңЁ</span></div>

    <script>
        const btn = document.getElementById('main-btn');
        const flashLayer = document.getElementById('flash-layer');
        const flashText = document.getElementById('flash-text');
        const emojis = ['рҹҳӮ', 'рҹ‘…', 'рҹҡ«', 'рҹ‘»', 'рҹӨЎ', 'вңЁ', 'рҹҘ¶', 'рҹҺ¶', 'рҹҳ’', 'рҹ’©'];

        let isBarrierMode = false;

        // 1. кіөнҶө лҸ„л§қк°Җкё° лЎңм§Ғ
        function troll() {
            if (isBarrierMode) return;

            if (Math.random() < 0.15) { activateBarrier(); return; }

            if (Math.random() < 0.2) {
                flashLayer.style.opacity = '1';
                flashText.style.display = 'block';
                moveRandom();
                setTimeout(() => {
                    flashLayer.style.transition = 'opacity 1.5s';
                    flashLayer.style.opacity = '0';
                    setTimeout(() => { flashText.style.display = 'none'; }, 1500);
                }, 500);
                return;
            }

            moveRandom();
            spawnEmojis();
        }

        function moveRandom() {
            btn.style.left = Math.random() * 80 + 10 + '%';
            btn.style.top = Math.random() * 80 + 10 + '%';
            btn.style.transform = `translate(-50%, -50%) scale(${Math.random() * 1.5 + 0.5})`;
        }

        function activateBarrier() {
            isBarrierMode = true;
            btn.innerText = "рҹӣЎпёҸ м ‘к·ј л¶Ҳк°Җ";
            btn.style.boxShadow = "0 0 50px #ff00ff";
            setTimeout(() => {
                isBarrierMode = false;
                btn.innerText = "м§ҖкёҲ нҒҙлҰӯ!";
                btn.style.boxShadow = "none";
                troll();
            }, 3000);
        }

        function spawnEmojis() {
            for(let i=0; i<6; i++) {
                const el = document.createElement('div');
                el.className = 'effect';
                el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = btn.style.left;
                el.style.top = btn.style.top;
                const moveX = (Math.random() - 0.5) * 300 + 'px';
                const moveY = (Math.random() - 0.5) * 300 + 'px';
                el.style.setProperty('--x', moveX);
                el.style.setProperty('--y', moveY);
                el.style.animation = 'popOut 0.8s forwards';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 800);
            }
        }

        // 2. н•өмӢ¬: PC(л§Ҳмҡ°мҠӨ)мҷҖ нҸ°(н„°м№ҳ) лӘЁл‘җм—җм„ң л°Җм–ҙлӮҙкё°
        function handleMove(inputX, inputY) {
            if (!isBarrierMode) return;

            const btnRect = btn.getBoundingClientRect();
            const btnX = btnRect.left + btnRect.width / 2;
            const btnY = btnRect.top + btnRect.height / 2;
            
            const distance = Math.sqrt(Math.pow(inputX - btnX, 2) + Math.pow(inputY - btnY, 2));

            // 150px м•ҲмңјлЎң л“Өм–ҙмҳӨл©ҙ л°Җм–ҙлӮҙкё°
            if (distance < 150) {
                const angle = Math.atan2(inputY - btnY, inputX - btnX);
                const pushX = Math.cos(angle) * -150;
                const pushY = Math.sin(angle) * -150;

                btn.style.left = (btnX + pushX) + 'px';
                btn.style.top = (btnY + pushY) + 'px';
            }
        }

        // PC л§Ҳмҡ°мҠӨ мқҙлҸҷ к°җм§Җ
        document.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));

        // нҸ° н„°м№ҳ мқҙлҸҷ к°җм§Җ (нҷ”л©ҙмқ„ нӣ‘мқ„ л•Ң)
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            handleMove(touch.clientX, touch.clientY);
        }, { passive: false });

        btn.addEventListener('mouseover', troll);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); troll(); });

        btn.onclick = () => alert("мӮ¬мӢӨ кө¬лқјм—җмҡ” вҳҶ*: .пҪЎ. o(вү§в–ҪвүҰ)o .пҪЎ.:*вҳҶ");
    </script>
</body>
</html>
